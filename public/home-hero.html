    inset: 0;
    border-radius: inherit;
    padding: 1.4px;

      rgba(255, 255, 255, 0.45) 0%,

      rgba(255, 255, 255, 0) 40%,
      rgba(255, 255, 255, 0) 60%,

  }

    function _AsmeHero_REMOVED() {
      const videoRef = React.useRef(null);

      React.useEffect(() => {
        const v = videoRef.current;
        if (!v) return;
        v.style.opacity = "0";

        let raf = 0;
        const animateOpacity = (from, to, duration) => {
          cancelAnimationFrame(raf);
          const start = performance.now();
          const tick = (now) => {
            const t = Math.min(1, (now - start) / duration);
            v.style.opacity = String(from + (to - from) * t);
            if (t < 1) raf = requestAnimationFrame(tick);
          };
          raf = requestAnimationFrame(tick);
        };

        const onCanPlay = () => {
          v.play().catch(() => {});
          animateOpacity(0, 1, 500);
        };
        const onTimeUpdate = () => {
          if (!v.duration) return;
          if (v.duration - v.currentTime <= 0.55) {
            const cur = parseFloat(v.style.opacity || "1");
            if (cur > 0.05) animateOpacity(cur, 0, 500);
          }
        };
        const onEnded = () => {
          v.style.opacity = "0";
          setTimeout(() => {
            v.currentTime = 0;
            v.play().catch(() => {});
            animateOpacity(0, 1, 500);
          }, 100);
        };
        v.addEventListener("canplay", onCanPlay);
        v.addEventListener("timeupdate", onTimeUpdate);
        v.addEventListener("ended", onEnded);
        return () => {
          cancelAnimationFrame(raf);
          v.removeEventListener("canplay", onCanPlay);
          v.removeEventListener("timeupdate", onTimeUpdate);
          v.removeEventListener("ended", onEnded);
        };
      }, []);

      return e(

    function AsmeAbout() {
      const ref = React.useRef(null);
      const [inView, setInView] = React.useState(false);
      React.useEffect(() => {
        if (!ref.current) return;
        const o = new IntersectionObserver(
          (entries) => entries.forEach((en) => en.isIntersecting && setInView(true)),
          { rootMargin: "-100px" }
        );
        o.observe(ref.current);
        return () => o.disconnect();
      }, []);
      const a = (delay) => ({
        initial: { opacity: 0, y: 40 },
        animate: inView ? { opacity: 1, y: 0 } : { opacity: 0, y: 40 },
        transition: { duration: 0.8, delay },
      });
      const aLabel = {
        initial: { opacity: 0, y: 20 },
        animate: inView ? { opacity: 1, y: 0 } : { opacity: 0, y: 20 },
        transition: { duration: 0.6 },
      };

        },
